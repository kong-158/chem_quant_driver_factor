name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py

      - name: Check expected outputs
        run: |
          test -f outputs/tables/factor_ic_summary.csv
          test -f outputs/tables/monthly_group_returns.csv
          test -f outputs/tables/top_bottom_performance.csv
          test -f outputs/figures/ic_series.png
          test -f outputs/figures/group_cum_returns.png
          test -f outputs/figures/top_bottom_cum_returns.png
          test -f outputs/figures/drawdown.png
